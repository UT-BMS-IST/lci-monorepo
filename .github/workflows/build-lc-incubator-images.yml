name: Build LC incubator images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Do not deploy after building images"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f ./apps/lc-incubator/Dockerfile \
            --build-arg ENVIRONMENT=test \
            -t ghcr.io/ut-bms-ist/lc-incubator-frontend:${{ github.ref_name }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/ut-bms-ist/lc-incubator-frontend:${{ github.ref_name }}

      - name: Tag and push as latest
        run: |
          docker tag ghcr.io/ut-bms-ist/lc-incubator-frontend:${{ github.ref_name }} ghcr.io/ut-bms-ist/lc-incubator-frontend:latest
          docker push ghcr.io/ut-bms-ist/lc-incubator-frontend:latest

      - name: Wait for images to be available
        if: ${{ inputs.skip_deploy != true }}
        run: sleep 5

      - name: Trigger Deployment Workflow
        if: ${{ inputs.skip_deploy != true }}
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-lc-incubator.yml/dispatches \
               -d "{\"ref\":\"${{ github.ref }}\"}"

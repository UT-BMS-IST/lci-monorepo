<div class="results-container">
  <section class="answers-section">
    <h2>Je antwoorden zijn:</h2>

    <div class="answers-list">
      <div *ngFor="let result of results" class="answer-row">
        <span class="answer-question">{{ result.question }}</span>
        <span class="answer-value">{{ result.answer }}</span>
      </div>
    </div>
  </section>

  <section class="code-section">
    <h2>De code is: <span class="route-code">{{ routeCode }}</span></h2>
    <p>
      Deze code heb je nodig om naar de juiste pagina in de LC Incubator te gaan.
      Noteer de code en klik vervolgens op de onderstaande knop.
    </p>

    <a
      [href]="routePageUrl"
      class="tool-suggestions-button"
      target="lciobsidian">
      Tool suggesties
    </a>
  </section>
</div>

---
- questions:
    - id: route
      type: radio
      questionSubtitle: "Waar wil je de Learning Community bij ondersteunen?"
      configuration:
        options:
          - value: "R1"
            label: "Scherp krijgen waar we voor gaan"
            optionExplanation: "Ambitie, doelen, motieven en waarde aanscherpen"
          - value: "R2"
            label: "In beeld krijgen wie belangrijk is en wat er speelt rondom de samenwerking"
            optionExplanation: "Partners, stakeholders en context begrijpen"
          - value: "R3"
            label: "Grip krijgen op de samenwerking"
            optionExplanation: "Werkwijze, activiteiten en rollen in samenhang organiseren"
          - value: "R4"
            label: "Zicht krijgen op wat de samenwerking oplevert"
            optionExplanation: "Resultaten, leren, waarde en impact bespreken"
- questions:
    - id: scenario_r1
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om scherp te krijgen waar de LC voor gaat?"
      condition:
        id: route
        value:
          - "R1"
      configuration:
        options:
          - value: "A"
            label: "We hebben eerst overzicht nodig"
            optionExplanation: "Ambitie, doelen, motieven of waarde voor betrokken partijen zijn nog niet scherp genoeg, worden verschillend geinterpreteerd of zijn onvoldoende met elkaar verbonden"
          - value: "B"
            label: "We willen bepalen waar aandacht of actie nodig is"
            optionExplanation: "Ambities, doelen, motieven of waarde zijn al in beeld, maar het is nodig deze verder uit te werken, af te wegen, te prioriteren of te volgen"
    - id: scenario_r2
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om te weten wie en wat belangrijk is?"
      condition:
        id: route
        value:
          - "R2"
      configuration:
        options:
          - value: "A"
            label: "We hebben eerst overzicht nodig"
            optionExplanation: "Welke partners, stakeholders, of externe ontwikkelingen relevant zijn, is nog onvoldoende scherp of onvoldoende in samenhang"
          - value: "B"
            label: "We willen bepalen waar aandacht of actie nodig is"
            optionExplanation: "Partners, stakeholders en externe ontwikkelingen zijn al in beeld, maar het is nodig om deze verder uit te werken, af te wegen, te prioriteren, of te volgen"
    - id: scenario_r3
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om grip te krijgen op de samenwerking?"
      condition:
        id: route
        value:
          - "R3"
      configuration:
        options:
          - value: "A"
            label: "We hebben eerst overzicht nodig"
            optionExplanation: "Welke activiteiten, rollen. middelen of werkwijzen nodig zijn, is nog niet scherp genoeg of onvoldoende in samenhang"
          - value: "B"
            label: "We willen bepalen waar aandacht of actie nodig is"
            optionExplanation: "Activiteiten, rollen, middelen en werkwijzen zijn al in beeld, maar het is nodig om ze verder uit te werken, af te wegen, te prioriteren, te verdelen of te volgen"
    - id: scenario_r4
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om zicht te krijgen op wat de samenwerking oplevert?"
      condition:
        id: route
        value:
          - "R4"
      configuration:
        options:
          - value: "A"
            label: "We hebben eerst overzicht nodig"
            optionExplanation: "Welke resultaten, leeropbrengsten, effecten of impact verwacht worden of bereikt zijn, is nog niet scherp genoeg of onvoldoende in samenhang"
          - value: "B"
            label: "We willen bepalen waar aandacht of actie nodig is"
            optionExplanation: "Resultaten, leeropbrengsten, effecten en impact zijn al in beeld, maar het is nodig ze verder uit te werken of op te volgen en delen"
- questions:
    - id: audience
      type: radio
      questionSubtitle: "Wat beschrijft de kern van jouw LC het beste?"
      configuration:
        options:
          - value: "G"
            label: "Verbinden, inspireren en kennis delen"
            optionExplanation: "Vooral gericht op netwerkvorming, ontmoeting, kennisuitwisseling, inspiratie en agendering van regionale of landelijke vraagstukken"
          - value: "K"
            label: "Samen werken, leren en innoveren aan een concrete oplossing"
            optionExplanation: "Vooral gericht op co-creatie en experimenteren in de praktijk"

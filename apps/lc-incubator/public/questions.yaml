---
- questions:
    - id: route
      type: radio
      questionSubtitle: "Waar wil je de Learning Community bij ondersteunen?"
      configuration:
        options:
          - value: "R1"
            label: "Scherp krijgen waar we voor gaan"
            optionExplanation: "Ambitie, doelen, motieven en waarde aanscherpen"
          - value: "R2"
            label: "In beeld krijgen wie en wat belangrijk is"
            optionExplanation: "Partners, stakeholders en context begrijpen"
          - value: "R3"
            label: "Grip krijgen op de samenwerking"
            optionExplanation: "Werkwijze, activiteiten en rollen in samenhang organiseren"
          - value: "R4"
            label: "Zicht krijgen op wat het oplevert"
            optionExplanation: "Resultaten, leren, waarde en impact bespreken"
- questions:
    - id: scenario_r1
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om scherp te krijgen waar de LC voor gaat?"
      condition:
        id: route
        value:
          - "R1"
      configuration:
        options:
          - value: "A"
            label: "We hebben eerst overzicht nodig"
            optionExplanation: "Ambitie, doelen, motieven of waarde zijn nog niet helder, worden verschillend geinterpreteerd of zijn onvoldoende met elkaar verbonden"
          - value: "B"
            label: "We willen bepalen waar aandacht of actie nodig is"
            optionExplanation: "Ambitie, doelen, motieven of waarde zijn al in beeld, maar moeten verder worden uitgewerkt, afgestemd of opgevolgd"
    - id: scenario_r2
      type: radio
      questionSubtitle: "Wat is nu vooral nodig om in beeld te krijgen wie en wat belangrijk is?"
      condition:
        id: route
        value:
          - "R2"

---
- questions:
    - id: route
      type: radio
      questionSubtitle: "Waarvoor zoek je een tool?"
      configuration:
        options:
          - value: "R1"
            label: "Ontwerp van de learning community"
            optionExplanation: "Hoe ziet onze LC er op hoofdlijnen uit?"
          - value: "R2"
            label: "Context en betrokkenen"
            optionExplanation: "Waar speelt dit? Wie participeren?"
          - value: "R3"
            label: "Richting, ambitie en waarde"
            optionExplanation: "Waarom werken we samen? Wat willen we bereiken?"
          - value: "R4"
            label: "Ontwikkelen, leren en testen"
            optionExplanation: "Wat willen we concreet samen leren en innoveren? Hoe doen we dat?"
          - value: "R5"
            label: "Evalueren van resultaten en impact"
            optionExplanation: "Wat hebben we geleerd en wat heeft het opgeleverd?"

- questions:
    - id: scenario_r1
      type: radio
      questionSubtitle: "Welke situatie past het best?"
      condition:
        id: route
        value:
          - "R1"
      configuration:
        options:
          - value: "A"
            label: "We willen de LC als geheel scherper maken"
            optionExplanation: "Bijvoorbeeld: We willen de LC in kaart brengen als samenhangend geheel."
          - value: "B"
            label: "We willen de LC beter organiseren"
            optionExplanation: "Bijvoorbeeld: De werkwijzen en structuur zijn onduidelijk."
    - id: scenario_r2
      type: radio
      questionSubtitle: "Welke situatie past het best?"
      condition:
        id: route
        value:
          - "R2"
      configuration:
        options:
          - value: "A"
            label: "We willen de context beter kennen"
            optionExplanation: "Bijvoorbeeld: We willen ontwikkelingen en het speelveld van de LC in kaart brengen."
          - value: "B"
            label: "We willen betrokkenen beter begrijpen"
            optionExplanation: "Bijvoorbeeld: We missen inzicht in belangen en invloed van stakeholders."
    - id: scenario_r3
      type: radio
      questionSubtitle: "Welke situatie past het best?"
      condition:
        id: route
        value:
          - "R3"
      configuration:
        options:
          - value: "A"
            label: "We willen een gedeelde richting verkennen"
            optionExplanation: "Bijvoorbeeld: We willen gezamenlijk ambitie, motieven en waarden in kaart brengen"
          - value: "B"
            label: "We willen richting vertalen naar activiteiten"
            optionExplanation: "Bijvoorbeeld: We willen onze gedeelde richting uitvoeren."
    - id: scenario_r4
      type: radio
      questionSubtitle: "Welke situatie past het best?"
      condition:
        id: route
        value:
          - "R4"
      configuration:
        options:
          - value: "A"
            label: "We willen scherp krijgen wat we willen leren of innoveren"
            optionExplanation: "Bijvoorbeeld: We willen ideeen en oplossingsrichtingen in kaart brengen."
          - value: "B"
            label: "We willen een concreet idee of innovatievraagstuk uitproberen in de praktijk"
            optionExplanation: "Bijvoorbeeld: We hebben een leer- of innovatievraagstuk, maar nog geen heldere aanpak."
    - id: scenario_r5
      type: radio
      questionSubtitle: "Welke situatie past het best?"
      condition:
        id: route
        value:
          - "R5"
      configuration:
        options:
          - value: "A"
            label: "We willen zien wat we gedaan hebben"
            optionExplanation: "Bijvoorbeeld: We willen onze activiteiten, sessies en experimenten in kaart brengen."
          - value: "B"
            label: "We willen opbrengsten en impact vertalen naar actie"
            optionExplanation: "Bijvoorbeeld: We willen de resultaten en effecten van de LC meetbaar maken"

- questions:
    - id: audience
      type: radio
      questionSubtitle: "Welk antwoord typeert de setting waarin je de tool wilt gebruiken?"
      configuration:
        options:
          - value: "G"
            label: "We stimuleren leren en innovatie vooral via verbinden, inspireren, en kennis delen"
            optionExplanation: "Bijvoorbeeld via netwerkbijeenkomsten, inspiratiesessie en webinars"
          - value: "K"
            label: "We ondersteunen leren en innovatie vooral via experimenteren in de praktijk"
            optionExplanation: "Bijvoorbeeld via een omgeving met faciliteiten (field lab), of in een 'real life' setting (living lab of challenge based)"

- questions:
    - id: audience
      type: radio
      questionSubtitle: "Wat beschrijft het beste jouw LC?"
      configuration:
        options:
          - value: "G"
            label: "We richten ons vooral op verbinden, inspireren en kennis delen"
            optionExplanation: "Vooral gericht op netwerkvorming, ontmoeting, kennisuitwisseling, inspiratie en agendering van vraagstukken"
          - value: "K"
            label: "We richten ons vooral op leren en uitproberen in de praktijk"
            optionExplanation: "Vooral gericht op co-creatie en experimenteren"

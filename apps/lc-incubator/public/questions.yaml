          - value: "B"
            label:  "We willen het ontwerp omzetten in actie"
            optionExplanation: "Inrichting, samenhang en benodigde condities voor goed functioneren zijn al in beeld, maar het is nodig deze verder uit te werken, te beoordelen, te versterken of op te volgen"

- questions:
    - id: audience
      type: radio
      questionSubtitle: "Wat beschrijft de kern van jouw LC het beste?"
      configuration:
        options:
          - value: "G"
            label: "Verbinden, inspireren en kennis delen"
            optionExplanation: "Vooral gericht op netwerkvorming, ontmoeting, kennisuitwisseling, inspiratie en agendering van regionale of landelijke vraagstukken"
          - value: "K"
            label: "Samen werken, leren en innoveren aan een concrete oplossing"
            optionExplanation: "Vooral gericht op co-creatie en experimenteren in de praktijk"
